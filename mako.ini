# Literary Universe Light — Mako notifications
# Art Nouveau: warm ivory, LU magenta border, sepia text

text-color=#3A2E28
border-color=#A12577
background-color=#F7F2EA
width=420
height=110
padding=12
border-size=2
border-radius=8
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
