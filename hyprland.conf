# Manuscript — Hyprland
# Art Nouveau: flowing curves, warm ivory, LU magenta accent
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor   = rgba(A12577ee) rgba(C4963Aee) 45deg
$inactiveBorderColor = rgba(8A6A4A55)

general {
    col.active_border   = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 2
    gaps_in = 4
    gaps_out = 3
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 12
    rounding_power = 3
    shadow {
        enabled = false
        range = 15
        render_power = 5
        offset = 0 0
    }
    blur {
        enabled = true
        size = 3
        passes = 3
        contrast = 0.9
        brightness = 0.85
        vibrancy = 0.15
        vibrancy_darkness = 0.1
        noise = 0.02
        ignore_opacity = true
    }
}

# Gentle, organic animations — Art Nouveau feel
animations {
    enabled = yes

    bezier = easeSoft, 0.18, 0.62, 0.32, 1.00
    bezier = easeFade, 0.28, 0.00, 0.22, 1.00

    animation = windows,          1, 2.6, easeSoft
    animation = windowsIn,        1, 2.4, easeSoft, popin 85%
    animation = windowsOut,       1, 2.2, easeFade, popin 90%
    animation = windowsMove,      1, 2.8, easeSoft

    animation = fade,             1, 2.2, easeFade
    animation = fadeIn,           1, 2.0, easeSoft
    animation = fadeOut,          1, 1.8, easeFade
    animation = fadeDim,          1, 1.8, easeFade

    animation = layers,           1, 2.2, easeSoft
    animation = layersIn,         1, 2.0, easeSoft, fade
    animation = layersOut,        1, 1.8, easeFade, fade

    animation = workspaces,       1, 2.4, easeSoft, slide
    animation = specialWorkspace, 1, 2.2, easeSoft, slidevert

    animation = border,           1, 2.8, easeSoft
    animation = borderangle,      1, 3.0, easeSoft
    animation = fadeSwitch,       1, 1.4, easeFade
}

