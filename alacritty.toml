# Literary Universe Light — Alacritty
# Art Nouveau: warm ivory, sepia ink, muted sage, dusty rose, soft gold

[colors.primary]
background = "#F7F2EA"
foreground = "#3A2E28"
dim_foreground = "#8A7A6E"

[colors.cursor]
text = "#F7F2EA"
cursor = "#A12577"

[colors.vi_mode_cursor]
text = "#F7F2EA"
cursor = "#A12577"

[colors.search.matches]
foreground = "#F7F2EA"
background = "#A12577"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#F7F2EA"
background = "#6B4F3A"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

